# Example runtime configuration for resend-service.
#
# Hoplite loads the checked-in classpath resource at
# src/main/resources/application.conf. That file also supports environment
# variable substitutions for container and deployment environments.
#
# Use this file as a reference only; Config.load() does not load it directly.
# The host value is currently logged but not applied to the Jetty bind address.

port = 3000
host = "0.0.0.0"

# Use a PostgreSQL URI, not a jdbc:postgresql URL. URI-escape credentials.
databaseUrl = "postgresql://user:password@database-host:5432/database"
resendApiKey = "re_xxxxxxxxxxxxxxxxxxxxx"
webhookSecret = "whsec_xxxxxxxxxxxxxxxxxxxxx"
resendFrom = "Mailbox <mailbox@example.com>"
resendReplyTo = "mailbox@replies.example.com"
conversationApiKey = "replace-with-a-long-random-secret"
outboxDrainApiKey = "replace-with-another-long-random-secret"
