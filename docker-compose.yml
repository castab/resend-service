services:
  postgresql:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: resend_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql

  app:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/resend_test
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_API_BASE_URL: ${RESEND_API_BASE_URL:-}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      CONVERSATION_API_KEY: ${CONVERSATION_API_KEY:-}
      OUTBOX_DRAIN_API_KEY: ${OUTBOX_DRAIN_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
    depends_on:
      - postgresql

volumes:
  postgresql_data:
