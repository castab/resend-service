name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgresql:
        image: postgres:18
        env:
          POSTGRES_DB: resend_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup test databases
        run: npm run db:setup
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test

      - name: Validate
        run: |
          npm run db:validate
          npm run lint
          npm run build

      - name: Start dev server
        run: npm run dev &
        env:
          RESEND_WEBHOOK_SECRET: whsec_dGVzdF9zZWNyZXRfa2V5X2Zvcl90ZXN0aW5nXzEyMzQ=
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 && break
            sleep 1
          done

      - name: Run tests
        run: npm test
        env:
          RESEND_WEBHOOK_SECRET: whsec_dGVzdF9zZWNyZXRfa2V5X2Zvcl90ZXN0aW5nXzEyMzQ=
          APP_BASE_URL: http://localhost:3000
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test
