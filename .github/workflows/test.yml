name: Tests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: resend
          POSTGRES_PASSWORD: resend
          POSTGRES_DB: resend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resend -d resend_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://resend:resend@127.0.0.1:5432/resend_test
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: graalvm
          java-version: '25'
          cache: gradle
      - name: Test and build JVM distribution
        run: sh ./gradlew test shadowJar
      - name: Build native executable
        run: sh ./gradlew nativeCompile --no-configuration-cache
      - name: Build production image
        run: docker build -t resend-service:test .
