name: Tests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@7a445ee88d4e23b52c33c5f006e65c9d81212c1c
        with:
          distribution: graalvm
          java-version: '25'
          cache: gradle
      - name: Test and build JVM distribution
        run: ./gradlew test shadowJar
      - name: Build native executable
        run: ./gradlew nativeCompile
      - name: Build production image
        run: docker build -t resend-service:test .
