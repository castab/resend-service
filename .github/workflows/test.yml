name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgresql:
        image: postgres:18
        env:
          POSTGRES_DB: resend_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup test databases
        run: npm run db:setup
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test

      - name: Validate
        run: |
          npm run db:validate
          npm run api:validate
          npm run lint
          npm run build

      - name: Start application
        run: |
          npm run dev > app.log 2>&1 &
        env:
          RESEND_WEBHOOK_SECRET: whsec_dGVzdF9zZWNyZXRfa2V5X2Zvcl90ZXN0aW5nXzEyMzQ=
          RESEND_API_KEY: test-resend-api-key
          RESEND_API_BASE_URL: http://localhost:4010
          RESEND_FROM: "Test Mailbox <mailbox@example.com>"
          CONVERSATION_API_KEY: test-conversation-api-key
          OUTBOX_DRAIN_API_KEY: test-outbox-drain-api-key
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test

      - name: Wait for application
        run: |
          for i in {1..30}; do
            curl --fail --silent http://localhost:3000/api/health/v1 && break
            sleep 1
          done
          curl --fail --silent http://localhost:3000/api/health/v1 > /dev/null || (cat app.log && exit 1)

      - name: Run tests
        run: npm run test:postgresql
        env:
          RESEND_WEBHOOK_SECRET: whsec_dGVzdF9zZWNyZXRfa2V5X2Zvcl90ZXN0aW5nXzEyMzQ=
          RESEND_API_KEY: test-resend-api-key
          RESEND_API_BASE_URL: http://localhost:4010
          RESEND_FROM: "Test Mailbox <mailbox@example.com>"
          CONVERSATION_API_KEY: test-conversation-api-key
          OUTBOX_DRAIN_API_KEY: test-outbox-drain-api-key
          APP_BASE_URL: http://localhost:3000
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/resend_test

      - name: Build production image
        run: docker build -t resend-service:test .

      - name: Smoke test production image
        run: |
          docker run --rm --network host \
            -e DATABASE_URL=postgres://postgres:postgres@localhost:5432/resend_test \
            resend-service:test npm run db:migrate:deploy
          docker run -d --name resend-service-smoke --network host \
            -e PORT=3100 \
            -e DATABASE_URL=postgres://postgres:postgres@localhost:5432/resend_test \
            -e RESEND_API_KEY=test-resend-api-key \
            -e RESEND_WEBHOOK_SECRET=whsec_dGVzdF9zZWNyZXRfa2V5X2Zvcl90ZXN0aW5nXzEyMzQ= \
            -e RESEND_FROM="Test Mailbox <mailbox@example.com>" \
            -e CONVERSATION_API_KEY=test-conversation-api-key \
            -e OUTBOX_DRAIN_API_KEY=test-outbox-drain-api-key \
            resend-service:test
          for i in {1..30}; do
            curl --fail --silent http://localhost:3100/api/health/v1 && break
            sleep 1
          done
          curl --fail --silent http://localhost:3100/api/health/v1 > /dev/null || (docker logs resend-service-smoke && exit 1)
          curl --fail --silent http://localhost:3100/openapi.json > /dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:3100/api/conversations/v1?assignment=unassigned)" = "401"
          docker rm -f resend-service-smoke
